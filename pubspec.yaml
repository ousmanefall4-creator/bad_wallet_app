name: bad_wallet_app
description: "Application mobile Consumer pour BadWallet - Examen Flutter 2026"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- PACKAGES REQUIS PAR LE SUJET ---
  provider: ^6.1.2                # Gestion d'état (Loading, Loaded, Error)
  http: ^1.6.0                    # Requêtes vers l'API Backend (10.0.2.2:8080)
  intl: ^0.19.0                   # Formatage de la monnaie (ex : 50 000 XOF)
  google_fonts: ^6.2.1            # Typographie moderne (Poppins, Inter)
  flutter_secure_storage: ^9.2.2  # Sauvegarde locale sécurisée du numéro de téléphone

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # --- CONFIGURATION DE L'ICÔNE REQUISE POUR L'APK ---
  flutter_launcher_icons: ^0.13.1

# Configuration spécifique pour les icônes de l'application
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png" # Pensez à ajouter votre logo dans ce dossier !

flutter:
  uses-material-design: true

  # Déclaration du dossier assets pour le logo de l'application (Splash Screen)
 # assets:
  #  - assets/